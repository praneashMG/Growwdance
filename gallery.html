<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Groww Dance</title>
    <link rel="icon" href="images/logo.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        /* RTL */
        .rtl {
            direction: rtl;
        }

        [dir="rtl"] .title {
            margin-right: 20px !important;
        }

        /* THEME TOGGLE */
        :root {
            --home-bg: #ffffff;
            --text-color: #111111;
        }

        [data-theme="dark"] {
            --home-bg: #000000;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--home-bg) !important;
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        [data-theme="dark"] section,
        [data-theme="dark"] .card {
            background-color: #000000 !important;
        }

        [data-theme="dark"] .btn,
        [data-theme="dark"] .btn1:hover {
            color: #000000 !important;
        }

        [data-theme="dark"] body,
        [data-theme="dark"] p,
        [data-theme="dark"] h1,
        [data-theme="dark"] h2,
        [data-theme="dark"] h3,
        [data-theme="dark"] h4,
        [data-theme="dark"] h5,
        [data-theme="dark"] h6,
        [data-theme="dark"] span,
        [data-theme="dark"] li,
        [data-theme="dark"] a,
        [data-theme="dark"] label,
        [data-theme="dark"] small,
        [data-theme="dark"] strong,
        [data-theme="dark"] .filter-btn {
            color: #ffffff !important;
        }

        @media (max-width:821px) {
            .title {
                margin-top: 30px;
            }
        }
    </style>
</head>

<body class="font-sans">
    <!-- navbar -->
    <div id="navbar"></div>
    <!-- HERO BANNER -->
    <section class="relative h-screen bg-cover bg-center flex items-center justify-center text-white"
        style="background-image: url('images/bg8.avif');">

        <!-- Dark Overlay -->
        <div class="absolute inset-0 bg-black/60"></div>

        <!-- Content -->
        <div class="relative z-10 max-w-5xl mx-auto px-6 text-center">

            <!-- Icon -->
            <div class="flex justify-center mb-6">
                <div class="bg-white/20 backdrop-blur-md p-6 rounded-full">
                    <i class="bi bi-images text-5xl"></i>
                </div>
            </div>

            <!-- Heading -->
            <h1 class="text-4xl md:text-6xl font-bold mb-6 leading-tight">
                Our Dance Gallery
            </h1>

            <!-- Description -->
            <p class="text-lg md:text-xl text-gray-200 max-w-3xl mx-auto mb-8">
                Discover powerful moments from performances, competitions,
                rehearsals, and studio events. Every image tells a story of passion and dedication.
            </p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row justify-center gap-4">

                <a href="gallery.html" class="bg-[#4C1D95] px-8 py-3 rounded-xl font-semibold 
               hover:bg-[#360062] transition duration-300">
                    <i class="bi bi-grid-fill mr-2"></i> Explore Gallery
                </a>

                <a href="contact.html" class="btn1 border border-white px-8 py-3 rounded-xl 
               font-semibold hover:bg-white hover:text-[#4B0082] 
               transition duration-300">
                    <i class="bi bi-calendar-check-fill mr-2"></i> Join a Class
                </a>

            </div>

        </div>

    </section>
    <!-- SECTION1 -->
    <section id="gallery" class="py-20 bg-[#F5F3FF]">

        <div class="max-w-7xl mx-auto px-6">

            <!-- Section Header -->
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-bold text-[#4B0082]">
                    Explore Our Moments
                </h2>
                <p class="text-gray-600 mt-4">
                    Browse performances, studio sessions, and competition highlights.
                </p>
            </div>

            <!-- Filter Buttons -->
            <div class="flex flex-wrap justify-center gap-4 mb-12">

                <button onclick="filterGallery('all')"
                    class="filter-btn bg-[#4B0082] text-white px-6 py-2 rounded-full">
                    All
                </button>

                <button onclick="filterGallery('events')"
                    class="filter-btn border border-[#4B0082] text-[#4B0082] px-6 py-2 rounded-full">
                    Events
                </button>

                <button onclick="filterGallery('classes')"
                    class="filter-btn border border-[#4B0082] text-[#4B0082] px-6 py-2 rounded-full">
                    Classes
                </button>

                <button onclick="filterGallery('competition')"
                    class="filter-btn border border-[#4B0082] text-[#4B0082] px-6 py-2 rounded-full">
                    Competition
                </button>

            </div>

            <!-- Gallery Grid -->
            <!-- Gallery Grid -->
            <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

                <!-- EVENTS (4) -->
                <div class="gallery-item events overflow-hidden rounded-xl shadow-lg">
                    <img src="images/event1.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item events overflow-hidden rounded-xl shadow-lg">
                    <img src="images/event2.png"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item events overflow-hidden rounded-xl shadow-lg">
                    <img src="images/event3.jpg"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item events overflow-hidden rounded-xl shadow-lg">
                    <img src="images/event4.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>


                <!-- CLASSES (4) -->
                <div class="gallery-item classes overflow-hidden rounded-xl shadow-lg">
                    <img src="images/pic1.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item classes overflow-hidden rounded-xl shadow-lg">
                    <img src="images/bg7.webp"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item classes overflow-hidden rounded-xl shadow-lg">
                    <img src="images/img1.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item classes overflow-hidden rounded-xl shadow-lg">
                    <img src="images/class.webp"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>


                <!-- COMPETITION (4) -->
                <div class="gallery-item competition overflow-hidden rounded-xl shadow-lg">
                    <img src="images/company.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item competition overflow-hidden rounded-xl shadow-lg">
                    <img src="images/company2.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item competition overflow-hidden rounded-xl shadow-lg">
                    <img src="images/company3.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

                <div class="gallery-item competition overflow-hidden rounded-xl shadow-lg">
                    <img src="images/company4.avif"
                        class="w-full h-64 object-cover transition duration-500 hover:scale-110">
                </div>

            </div>

        </div>

    </section>

    <script>
        function filterGallery(category) {
            const items = document.querySelectorAll('.gallery-item');
            const buttons = document.querySelectorAll('.filter-btn');

            buttons.forEach(btn => {
                btn.classList.remove('bg-[#4B0082]', 'text-white');
                btn.classList.add('border', 'border-[#4B0082]', 'text-[#4B0082]');
            });

            event.target.classList.add('bg-[#4B0082]', 'text-white');
            event.target.classList.remove('border', 'text-[#4B0082]');

            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>
    <!-- FOOTER -->
    <div id="footer"></div>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'ui-sans-serif', 'system-ui'],
                    },
                },
            },
        }
    </script>
    <script src="navbar.js"></script>
    <script src="footer.js"></script>
</body>

</html>
